<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="GreenerPlatform">
  <!-- GreenerPlatform mark: evidence layers + a check that sprouts a leaf.
       Deterministic (check) + Greener (leaf). Palette: Evergreen #1E6E52 on Paper #F4F1EC. -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="#1E6E52"/>
  <g fill="none" stroke="#F4F1EC" stroke-width="7" stroke-linecap="round" opacity="0.28">
    <line x1="36" y1="86" x2="92" y2="86"/>
    <line x1="36" y1="98" x2="78" y2="98"/>
  </g>
  <path d="M32 60 L52 80 L74 54" fill="none" stroke="#F4F1EC" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M74 54 C 78 34, 96 28, 104 30 C 104 46, 92 58, 74 54 Z" fill="#F4F1EC"/>
  <path d="M84 48 C 90 42, 96 38, 101 35" fill="none" stroke="#1E6E52" stroke-width="3" stroke-linecap="round"/>
</svg>
